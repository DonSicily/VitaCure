<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1B5E20" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Circle background -->
  <circle cx="50" cy="50" r="45" fill="url(#iconGrad)" filter="url(#shadow)"/>
  
  <!-- Leaf -->
  <path d="M50 80 C30 80 10 65 10 45 C10 25 30 10 50 10 C70 10 90 25 90 45 C90 65 70 80 50 80 Z" 
        fill="#FFFFFF" opacity="0.95"/>
  <path d="M50 80 L50 20" stroke="#2E7D32" stroke-width="2.5" opacity="0.2"/>
  <path d="M50 45 L65 30" stroke="#2E7D32" stroke-width="2" opacity="0.2"/>
  <path d="M50 45 L35 30" stroke="#2E7D32" stroke-width="2" opacity="0.2"/>
  <path d="M50 45 L72 50" stroke="#2E7D32" stroke-width="2" opacity="0.2"/>
  <path d="M50 45 L28 50" stroke="#2E7D32" stroke-width="2" opacity="0.2"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="45" r="3" fill="#4CAF50" opacity="0.3"/>
</svg>
