version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: vitacure-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-password}
      - MONGO_INITDB_DATABASE=vitacure
    volumes:
      - mongodb_data:/data/db
    networks:
      - vitacure-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vitacure-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/vitacure?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-supersecretkey}
    depends_on:
      - mongodb
    networks:
      - vitacure-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vitacure-frontend
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://backend:5000/api
    depends_on:
      - backend
    networks:
      - vitacure-network

volumes:
  mongodb_data:

networks:
  vitacure-network:
    driver: bridge
